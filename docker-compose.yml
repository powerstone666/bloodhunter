services:
  app:
    build:
      context: .
      dockerfile: containers/Dockerfile.app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-admin}
      - SANDBOX_IMAGE=bloodhunter-sandbox:latest
    volumes:
      - ./data:/app/data
    depends_on:
      - sandbox
    networks:
      - bloodhunter

  sandbox:
    build:
      context: ./containers
      dockerfile: Dockerfile
    image: bloodhunter-sandbox:latest
    stdin_open: true
    tty: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    tmpfs:
      - /tmp:size=512M
    networks:
      - bloodhunter

networks:
  bloodhunter:
    driver: bridge
